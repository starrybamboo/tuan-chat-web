name: TuanChat 自动构建与部署

on:
  push:
    branches: [ "main", "dev" ]
  workflow_dispatch:  # 允许手动触发
    inputs:
      deploy_env:
        description: "部署环境（auto=按分支，dev=>test，main=>production）"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - test
          - production
      source_ref:
        description: "构建代码来源（分支/tag/commit，留空则使用当前触发分支）"
        required: false
        default: ""
        type: string

concurrency:
  # 同分支部署串行，避免并发任务互相覆盖部署目录
  group: tuan-chat-web-cd-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: tuan-chat-web构建与部署
    runs-on: ubuntu-latest
    env:
      DEPLOY_TARGET: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_env == 'test' && '/www/wwwroot/tuan-chat-web-test') || (github.event_name == 'workflow_dispatch' && inputs.deploy_env == 'production' && '/www/wwwroot/tuan-chat-web') || (github.ref_name == 'dev' && '/www/wwwroot/tuan-chat-web-test') || '/www/wwwroot/tuan-chat-web' }}
      BUILD_MODE: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_env == 'test' && 'test') || (github.event_name == 'workflow_dispatch' && inputs.deploy_env == 'production' && 'production') || (github.ref_name == 'dev' && 'test') || 'production' }}
      # 前端走同源反代，避免浏览器为跨域鉴权请求触发 CORS preflight。
      BACKEND_API_BASE_URL: /api
      BACKEND_WS_URL: /ws
      BACKEND_TTS_URL: https://test.tuan.chat/tts
    steps:
      - uses: actions/checkout@v4 # 将目标分支 checkout 到运行环境
        with:
          ref: ${{ (github.event_name == 'workflow_dispatch' && inputs.source_ref) || github.ref_name }}
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4 # 安装 node
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: install
        run: pnpm install --frozen-lockfile

      - name: build
        env:
          VITE_API_BASE_URL: ${{ env.BACKEND_API_BASE_URL }}
          VITE_API_WS_URL: ${{ env.BACKEND_WS_URL }}
          VITE_TTS_URL: ${{ env.BACKEND_TTS_URL }}
          VITE_ENABLE_REACT_SCAN: ${{ env.BUILD_MODE == 'test' && 'true' || 'false' }}
        run: pnpm build --mode $BUILD_MODE

      - name: 上传构建产物到服务器临时目录
        uses: appleboy/scp-action@v1
        with:
          # 优先使用新版 SERVER_* secrets；保留 SSH_* 兼容旧配置
          host: 38.14.195.6
          username: ${{ secrets.SERVER_USERNAME || secrets.SSH_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD || secrets.SSH_PASSWORD }}
          source: build/client/**
          target: /tmp/tuan-chat-web-release-${{ github.run_id }}-${{ github.run_attempt }}
          overwrite: true
          strip_components: 2

      - name: 发布到站点目录并校验
        uses: appleboy/ssh-action@v1
        with:
          host: 38.14.195.6
          username: ${{ secrets.SERVER_USERNAME || secrets.SSH_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD || secrets.SSH_PASSWORD }}
          script: |
            set -euo pipefail
            TARGET="${{ env.DEPLOY_TARGET }}"
            STAGING="/tmp/tuan-chat-web-release-${{ github.run_id }}-${{ github.run_attempt }}"

            # 先校验临时目录，避免坏包覆盖线上目录。
            test -f "$STAGING/index.html"
            test -d "$STAGING/assets"

            mkdir -p "$TARGET"

            # 以新包为准进行同步，保留系统目录与 Electron 更新目录。
            rsync -a --delete-delay \
              --exclude '.well-known' \
              --exclude '.user.ini' \
              --exclude 'updates' \
              "$STAGING"/ "$TARGET"/

            test -f "$TARGET/index.html"
            test -d "$TARGET/assets"

            ASSET_FILE_COUNT="$(find "$TARGET/assets" -type f | wc -l)"
            if [[ "${ASSET_FILE_COUNT}" -le 0 ]]; then
              echo "部署校验失败：assets 目录为空" >&2
              exit 1
            fi

            CACHE_CONF_BASENAME="tuan-chat-web-static-cache.conf"
            CACHE_CONF_CANDIDATES=(
              "/www/server/panel/vhost/nginx/${CACHE_CONF_BASENAME}"
              "/etc/nginx/conf.d/${CACHE_CONF_BASENAME}"
            )
            CACHE_CONF_CONTENT="$(cat <<'NGINX'
map "$host:$uri" $tuan_chat_asset_cache_control {
    default "";
    ~^(tuan\.chat|test\.tuan\.chat):/assets/.+ "public, max-age=31536000, immutable";
}

add_header Cache-Control $tuan_chat_asset_cache_control always;
NGINX
)"

            install_nginx_cache_conf() {
              local installed_conf=""
              local candidate

              for candidate in "${CACHE_CONF_CANDIDATES[@]}"; do
                local candidate_dir
                candidate_dir="$(dirname "$candidate")"

                if [[ "$candidate" == /www/server/panel/vhost/nginx/* && ! -d "$candidate_dir" ]]; then
                  continue
                fi

                mkdir -p "$candidate_dir"
                printf '%s\n' "$CACHE_CONF_CONTENT" > "$candidate"

                if nginx -t && nginx -T 2>/dev/null | grep -Fq "$candidate"; then
                  systemctl reload nginx
                  installed_conf="$candidate"
                  break
                fi

                rm -f "$candidate"
              done

              if [[ -z "$installed_conf" ]]; then
                echo "⚠️ 未找到会被当前 Nginx 加载的 conf.d/vhost 目录，无法自动更新 Cache-Control；请手动将 assets 配置为 public, max-age=31536000, immutable" >&2
                return 1
              fi

              echo "$installed_conf"
            }

            install_nginx_cache_conf_with_sudo() {
              local installed_conf=""
              local candidate

              for candidate in "${CACHE_CONF_CANDIDATES[@]}"; do
                local candidate_dir
                candidate_dir="$(dirname "$candidate")"

                if [[ "$candidate" == /www/server/panel/vhost/nginx/* && ! -d "$candidate_dir" ]]; then
                  continue
                fi

                sudo mkdir -p "$candidate_dir"
                printf '%s\n' "$CACHE_CONF_CONTENT" | sudo tee "$candidate" >/dev/null

                if sudo nginx -t && sudo nginx -T 2>/dev/null | grep -Fq "$candidate"; then
                  sudo systemctl reload nginx
                  installed_conf="$candidate"
                  break
                fi

                sudo rm -f "$candidate"
              done

              if [[ -z "$installed_conf" ]]; then
                echo "⚠️ 未找到会被当前 Nginx 加载的 conf.d/vhost 目录，无法自动更新 Cache-Control；请手动将 assets 配置为 public, max-age=31536000, immutable" >&2
                return 1
              fi

              echo "$installed_conf"
            }

            if [[ "$(id -u)" == "0" ]]; then
              CACHE_CONF="$(install_nginx_cache_conf || true)"
              if [[ -n "$CACHE_CONF" ]]; then
                echo "✅ Nginx 静态资源缓存头已更新：$CACHE_CONF"
              fi
            elif command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
              CACHE_CONF="$(install_nginx_cache_conf_with_sudo || true)"
              if [[ -n "$CACHE_CONF" ]]; then
                echo "✅ Nginx 静态资源缓存头已更新：$CACHE_CONF"
              fi
            else
              echo "⚠️ 当前部署账号无 root/sudo 权限，无法自动更新 Nginx Cache-Control；请手动将 assets 配置为 public, max-age=31536000, immutable" >&2
            fi

            rm -rf "$STAGING"
            echo "✅ 部署校验通过：index.html 存在，assets 文件数=${ASSET_FILE_COUNT}"
