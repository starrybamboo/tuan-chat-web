name: TuanChat Cloudflare Pages 部署

on:
  push:
    branches: ["main", "dev"]
  workflow_dispatch:
    inputs:
      deploy_env:
        description: "部署环境（auto=按分支，dev=>test，main=>production）"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - test
          - production
      source_ref:
        description: "构建代码来源（分支/tag/commit，留空则使用当前触发分支）"
        required: false
        default: ""
        type: string

concurrency:
  group: tuan-chat-web-cloudflare-pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: 构建并部署到 Cloudflare Pages
    runs-on: ubuntu-latest
    env:
      BUILD_MODE: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_env == 'test' && 'test') || (github.event_name == 'workflow_dispatch' && inputs.deploy_env == 'production' && 'production') || (github.ref_name == 'dev' && 'test') || 'production' }}
      PAGES_PROJECT_NAME: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_env == 'test' && 'tuan-chat-web-test') || (github.event_name == 'workflow_dispatch' && inputs.deploy_env == 'production' && 'tuan-chat-web') || (github.ref_name == 'dev' && 'tuan-chat-web-test') || 'tuan-chat-web' }}
      PAGES_BRANCH: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_env == 'test' && 'dev') || (github.event_name == 'workflow_dispatch' && inputs.deploy_env == 'production' && 'main') || github.ref_name }}
      BACKEND_API_BASE_URL: /api
      BACKEND_WS_URL: /ws
      BACKEND_TTS_URL: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_env == 'test' && 'https://test.tuan.chat/tts') || (github.event_name == 'workflow_dispatch' && inputs.deploy_env == 'production' && 'https://tuan.chat/tts') || (github.ref_name == 'dev' && 'https://test.tuan.chat/tts') || 'https://tuan.chat/tts' }}
      PUBLIC_SITE_URL: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_env == 'test' && 'https://test.tuan.chat') || (github.event_name == 'workflow_dispatch' && inputs.deploy_env == 'production' && 'https://tuan.chat') || (github.ref_name == 'dev' && 'https://test.tuan.chat') || 'https://tuan.chat' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ (github.event_name == 'workflow_dispatch' && inputs.source_ref) || github.ref_name }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ env.BACKEND_API_BASE_URL }}
          VITE_API_WS_URL: ${{ env.BACKEND_WS_URL }}
          VITE_TTS_URL: ${{ env.BACKEND_TTS_URL }}
          VITE_PUBLIC_SITE_URL: ${{ env.PUBLIC_SITE_URL }}
          VITE_ENABLE_REACT_SCAN: ${{ env.BUILD_MODE == 'test' && 'true' || 'false' }}
        run: pnpm build --mode "$BUILD_MODE"

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          pnpm dlx wrangler@latest pages deploy dist \
            --project-name "$PAGES_PROJECT_NAME" \
            --branch "$PAGES_BRANCH" \
            --commit-dirty=true
