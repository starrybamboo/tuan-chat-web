name: TuanChat Cloudflare Pages 手动部署

on:
  workflow_dispatch:
    inputs:
      deploy_env:
        description: "部署环境（auto=按分支，dev=>test，main=>production）"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - test
          - production
      source_ref:
        description: "构建代码来源（分支/tag/commit，留空则使用当前触发分支）"
        required: false
        default: ""
        type: string

concurrency:
  # test 与 production 都是直接上传，串行执行可避免两个手动发布互相取消。
  group: tuan-chat-web-cloudflare-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: 手动构建并部署到 Cloudflare Pages
    runs-on: ubuntu-latest
    env:
      BACKEND_API_BASE_URL: https://api.tuan.chat/api
      BACKEND_WS_URL: wss://api.tuan.chat/ws
      BACKEND_TTS_URL: https://api.tuan.chat/tts
      VITE_MEDIA_CDN_BASE_URL: https://media.tuan.chat
    steps:
      - name: Resolve deployment metadata
        id: deploy-meta
        shell: bash
        env:
          INPUT_DEPLOY_ENV: ${{ inputs.deploy_env }}
          INPUT_SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          set -euo pipefail

          SOURCE_REF="${INPUT_SOURCE_REF:-${GITHUB_REF_NAME}}"
          DEPLOY_ENV="${INPUT_DEPLOY_ENV}"

          if [[ ! "${SOURCE_REF}" =~ ^[A-Za-z0-9._/@:+-]+$ ]]; then
            echo "构建来源 ref 包含不支持的字符：${SOURCE_REF}" >&2
            exit 1
          fi

          if [[ "${DEPLOY_ENV}" == "auto" ]]; then
            NORMALIZED_REF="${SOURCE_REF#refs/heads/}"
            case "${NORMALIZED_REF}" in
              dev)
                DEPLOY_ENV="test"
                ;;
              main)
                DEPLOY_ENV="production"
                ;;
              *)
                echo "auto 仅能从 dev/main 推导环境；source_ref=${SOURCE_REF} 时请显式选择 test 或 production。" >&2
                exit 1
                ;;
            esac
          fi

          case "${DEPLOY_ENV}" in
            test)
              BUILD_MODE="test"
              PAGES_PROJECT_NAME="tuan-chat-web-test"
              PUBLIC_SITE_URL="https://test.tuan.chat"
              ;;
            production)
              BUILD_MODE="production"
              PAGES_PROJECT_NAME="tuan-chat-web"
              PUBLIC_SITE_URL="https://tuan.chat"
              ;;
            *)
              echo "不支持的部署环境：${DEPLOY_ENV}" >&2
              exit 1
              ;;
          esac

          {
            echo "source_ref=${SOURCE_REF}"
            echo "deploy_env=${DEPLOY_ENV}"
            echo "build_mode=${BUILD_MODE}"
            echo "pages_project_name=${PAGES_PROJECT_NAME}"
            echo "public_site_url=${PUBLIC_SITE_URL}"
          } >> "${GITHUB_OUTPUT}"

          echo "部署参数：env=${DEPLOY_ENV}, ref=${SOURCE_REF}, project=${PAGES_PROJECT_NAME}"

      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.deploy-meta.outputs.source_ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 有意不在部署流程中增加 lint、tsc、test 硬门禁：这些检查应在本地推送前完成，
      # 避免生产故障、紧急回滚或修复发布被存量告警、测试波动和工具故障阻塞。
      - name: Build
        env:
          VITE_API_BASE_URL: ${{ env.BACKEND_API_BASE_URL }}
          VITE_API_WS_URL: ${{ env.BACKEND_WS_URL }}
          VITE_TTS_URL: ${{ env.BACKEND_TTS_URL }}
          VITE_PUBLIC_SITE_URL: ${{ steps.deploy-meta.outputs.public_site_url }}
          VITE_TURNSTILE_SITE_KEY: 0x4AAAAAADuhW4KyzfPxtfWu
          VITE_ENABLE_REACT_SCAN: ${{ steps.deploy-meta.outputs.build_mode == 'test' && 'true' || 'false' }}
        run: pnpm build --mode "${{ steps.deploy-meta.outputs.build_mode }}"

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PAGES_PROJECT_NAME: ${{ steps.deploy-meta.outputs.pages_project_name }}
        run: |
          set -euo pipefail
          # Cloudflare 将带 --branch 的直接上传视为 preview；生产上传必须省略该参数。
          pnpm dlx wrangler@latest pages deploy dist \
            --project-name "$PAGES_PROJECT_NAME" \
            --commit-dirty=true
