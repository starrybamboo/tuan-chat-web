name: TuanChat 自动构建与部署

on:
  push:
    branches: [ "main", "dev" ]
  workflow_dispatch:  # 允许手动触发
    inputs:
      deploy_env:
        description: "部署环境（auto=按分支，dev=>test，main=>production）"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - test
          - production
      source_ref:
        description: "构建代码来源（分支/tag/commit，留空则使用当前触发分支）"
        required: false
        default: ""
        type: string

concurrency:
  # 同分支部署串行，避免并发任务互相覆盖部署目录
  group: tuan-chat-web-cd-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: tuan-chat-web构建与部署
    runs-on: ubuntu-latest
    env:
      DEPLOY_TARGET: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_env == 'test' && '/www/wwwroot/tuan-chat-web-test') || (github.event_name == 'workflow_dispatch' && inputs.deploy_env == 'production' && '/www/wwwroot/tuan-chat-web') || (github.ref_name == 'dev' && '/www/wwwroot/tuan-chat-web-test') || '/www/wwwroot/tuan-chat-web' }}
      BUILD_MODE: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_env == 'test' && 'test') || (github.event_name == 'workflow_dispatch' && inputs.deploy_env == 'production' && 'production') || (github.ref_name == 'dev' && 'test') || 'production' }}
      PUBLIC_HOST: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_env == 'test' && 'test.tuan.chat') || (github.event_name == 'workflow_dispatch' && inputs.deploy_env == 'production' && 'tuan.chat') || (github.ref_name == 'dev' && 'test.tuan.chat') || 'tuan.chat' }}
      # 前端走同源反代，避免浏览器为跨域鉴权请求触发 CORS preflight。
      BACKEND_API_BASE_URL: /api
      BACKEND_WS_URL: /ws
      BACKEND_TTS_URL: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_env == 'test' && 'https://test.tuan.chat/tts') || (github.event_name == 'workflow_dispatch' && inputs.deploy_env == 'production' && 'https://tuan.chat/tts') || (github.ref_name == 'dev' && 'https://test.tuan.chat/tts') || 'https://tuan.chat/tts' }}
    steps:
      - uses: actions/checkout@v4 # 将目标分支 checkout 到运行环境
        with:
          ref: ${{ (github.event_name == 'workflow_dispatch' && inputs.source_ref) || github.ref_name }}
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4 # 安装 node
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: install
        run: pnpm install --frozen-lockfile

      - name: build
        env:
          VITE_API_BASE_URL: ${{ env.BACKEND_API_BASE_URL }}
          VITE_API_WS_URL: ${{ env.BACKEND_WS_URL }}
          VITE_TTS_URL: ${{ env.BACKEND_TTS_URL }}
          VITE_ENABLE_REACT_SCAN: ${{ env.BUILD_MODE == 'test' && 'true' || 'false' }}
        run: pnpm build --mode $BUILD_MODE

      - name: 上传构建产物到服务器临时目录
        uses: appleboy/scp-action@v1
        with:
          # 优先使用新版 SERVER_* secrets；保留 SSH_* 兼容旧配置
          host: 38.14.195.6
          username: ${{ secrets.SERVER_USERNAME || secrets.SSH_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD || secrets.SSH_PASSWORD }}
          source: build/client/**
          target: /tmp/tuan-chat-web-release-${{ github.run_id }}-${{ github.run_attempt }}
          overwrite: true
          strip_components: 2

      - name: 发布到站点目录并校验
        uses: appleboy/ssh-action@v1
        with:
          host: 38.14.195.6
          username: ${{ secrets.SERVER_USERNAME || secrets.SSH_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD || secrets.SSH_PASSWORD }}
          script: |
            set -euo pipefail
            TARGET="${{ env.DEPLOY_TARGET }}"
            STAGING="/tmp/tuan-chat-web-release-${{ github.run_id }}-${{ github.run_attempt }}"

            # 先校验临时目录，避免坏包覆盖线上目录。
            test -f "$STAGING/index.html"
            test -d "$STAGING/assets"

            mkdir -p "$TARGET"

            # 以新包为准进行同步，保留系统目录与 Electron 更新目录。
            rsync -a --delete-delay \
              --exclude '.well-known' \
              --exclude '.user.ini' \
              --exclude 'updates' \
              "$STAGING"/ "$TARGET"/

            test -f "$TARGET/index.html"
            test -d "$TARGET/assets"

            ASSET_FILE_COUNT="$(find "$TARGET/assets" -type f | wc -l)"
            if [[ "${ASSET_FILE_COUNT}" -le 0 ]]; then
              echo "部署校验失败：assets 目录为空" >&2
              exit 1
            fi

            CACHE_INSTALLER="$STAGING/install-nginx-cache.sh"
            cat > "$CACHE_INSTALLER" <<'BASH'
            #!/usr/bin/env bash
            set -euo pipefail

            PUBLIC_HOST="${PUBLIC_HOST:?}"
            SNIPPET="/www/server/panel/vhost/snippets/tuan-chat-web-static-cache-locations.conf"
            OLD_GLOBAL_CONFS=(
              "/www/server/panel/vhost/nginx/tuan-chat-web-static-cache.conf"
              "/etc/nginx/conf.d/tuan-chat-web-static-cache.conf"
            )
            INCLUDE_LINE="include ${SNIPPET};"
            MARKER_BEGIN="# BEGIN tuan-chat-web static cache include"
            MARKER_END="# END tuan-chat-web static cache include"
            BACKUP_DIR="$(mktemp -d)"

            restore_backups() {
              shopt -s nullglob
              for backup in "$BACKUP_DIR"/vhost-*.bak; do
                local target
                target="$(cat "${backup}.path")"
                cp -p "$backup" "$target"
              done
              for backup in "$BACKUP_DIR"/old-global-*.bak; do
                local target
                target="$(cat "${backup}.path")"
                cp -p "$backup" "$target"
              done
            }

            trap 'rm -rf "$BACKUP_DIR"' EXIT

            has_server_name() {
              local conf="$1"
              awk -v host="$PUBLIC_HOST" '
                /^[[:space:]]*server_name[[:space:]]/ {
                  line = $0
                  sub(/[[:space:]]*#.*/, "", line)
                  sub(/;.*/, "", line)
                  count = split(line, parts, /[[:space:]]+/)
                  for (i = 2; i <= count; i++) {
                    if (parts[i] == host) {
                      found = 1
                    }
                  }
                }
                END { exit found ? 0 : 1 }
              ' "$conf"
            }

            mkdir -p "$(dirname "$SNIPPET")"
            cat > "$SNIPPET" <<'NGINX'
            # Managed by tuan-chat-web CD. Include this file inside the site server block.
            add_header Cache-Control "no-cache" always;

            location ^~ /assets/ {
                expires off;
                add_header Cache-Control "public, max-age=31536000, immutable" always;
                try_files $uri =404;
            }

            location = /index.html {
                expires off;
                add_header Cache-Control "no-cache" always;
            }

            location = /__spa-fallback.html {
                expires off;
                add_header Cache-Control "no-cache" always;
            }
            NGINX

            old_global_index=0
            for old_global_conf in "${OLD_GLOBAL_CONFS[@]}"; do
              if [[ -f "$old_global_conf" ]]; then
                backup="$BACKUP_DIR/old-global-${old_global_index}.bak"
                cp -p "$old_global_conf" "$backup"
                printf '%s' "$old_global_conf" > "${backup}.path"
                rm -f "$old_global_conf"
                old_global_index=$((old_global_index + 1))
              fi
            done

            patched_count=0
            shopt -s nullglob
            for conf in /www/server/panel/vhost/nginx/*.conf /etc/nginx/conf.d/*.conf; do
              if ! has_server_name "$conf"; then
                continue
              fi

              backup="$BACKUP_DIR/vhost-${patched_count}.bak"
              cp -p "$conf" "$backup"
              printf '%s' "$conf" > "${backup}.path"

              awk \
                -v host="$PUBLIC_HOST" \
                -v begin="$MARKER_BEGIN" \
                -v include_line="$INCLUDE_LINE" \
                -v end="$MARKER_END" '
                function has_server_name(line, host, parts, count, i) {
                  sub(/[[:space:]]*#.*/, "", line)
                  sub(/;.*/, "", line)
                  count = split(line, parts, /[[:space:]]+/)
                  for (i = 2; i <= count; i++) {
                    if (parts[i] == host) {
                      return 1
                    }
                  }
                  return 0
                }
                index($0, begin) > 0 { skipping = 1; next }
                index($0, end) > 0 { skipping = 0; next }
                skipping { next }
                {
                  print
                  if ($0 ~ "^[[:space:]]*server_name[[:space:]]" && has_server_name($0, host)) {
                    print "    " begin
                    print "    " include_line
                    print "    " end
                  }
                }
              ' "$conf" > "${conf}.tmp"
              mv "${conf}.tmp" "$conf"
              patched_count=$((patched_count + 1))
            done

            if [[ "$patched_count" -le 0 ]]; then
              echo "未找到 server_name=${PUBLIC_HOST} 的 Nginx vhost 配置，无法安装缓存策略。" >&2
              restore_backups
              exit 1
            fi

            if ! nginx -t; then
              echo "Nginx 配置校验失败，已回滚缓存策略变更。" >&2
              restore_backups
              nginx -t || true
              exit 1
            fi

            if ! nginx -T 2>/dev/null | grep -Fq "$SNIPPET"; then
              echo "Nginx 配置未加载缓存片段：$SNIPPET" >&2
              restore_backups
              nginx -t || true
              exit 1
            fi

            if command -v systemctl >/dev/null 2>&1 && systemctl is-active --quiet nginx; then
              systemctl reload nginx
            else
              nginx -s reload
            fi

            echo "✅ Nginx 缓存策略已更新：host=${PUBLIC_HOST}, snippet=${SNIPPET}, patched=${patched_count}"
            BASH
            sed -i 's/^            //' "$CACHE_INSTALLER"
            chmod +x "$CACHE_INSTALLER"

            if [[ "$(id -u)" == "0" ]]; then
              PUBLIC_HOST="${{ env.PUBLIC_HOST }}" "$CACHE_INSTALLER"
            elif command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
              sudo env PUBLIC_HOST="${{ env.PUBLIC_HOST }}" "$CACHE_INSTALLER"
            else
              echo "当前部署账号无 root/sudo 权限，无法更新 Nginx Cache-Control；为避免继续发布错误缓存头，本次部署失败。" >&2
              exit 1
            fi

            rm -rf "$STAGING"
            echo "✅ 部署校验通过：index.html 存在，assets 文件数=${ASSET_FILE_COUNT}"
#        uses: burnett01/rsync-deployments@7.0.2 # 使用专门的 rsync action
#        with:
#          # rsync 的参数开关
#          # -a: 归档模式，保持文件权限、所有者等信息
#          # -v: 详细模式，显示传输过程
#          # -z: 压缩传输
#          # --delete: 删除目标目录中源目录没有的文件，保持完全同步
#
