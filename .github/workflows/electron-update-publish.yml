name: Electron 增量更新发布

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      webgal_terre_release_url:
        description: "WebGAL_Terre release zip 下载地址；留空则使用 secret WEBGAL_TERRE_RELEASE_URL"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: electron-update-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-installer:
    name: 构建 Windows 安装包
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve WebGAL Terre runtime
        shell: pwsh
        env:
          WEBGAL_TERRE_RELEASE_URL: ${{ (github.event_name == 'workflow_dispatch' && inputs.webgal_terre_release_url) || secrets.WEBGAL_TERRE_RELEASE_URL }}
        run: .\scripts\resolve-webgal-terre-release.ps1

      - name: Build NSIS package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # 避免复用 release/win-unpacked 触发 app.asar 文件占用，使用本次运行专属输出目录。
          $outputDir = "release_ci/windows-${{ github.run_id }}-${{ github.run_attempt }}"

          pnpm -s electron:prepare:resources
          pnpm -s build
          pnpm exec electron-builder build --config electron-builder.json --win nsis --config.directories.output=$outputDir

          "ELECTRON_OUTPUT_DIR=$outputDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Collect update artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          New-Item -ItemType Directory -Path dist-update -Force | Out-Null

          if ([string]::IsNullOrWhiteSpace($env:ELECTRON_OUTPUT_DIR)) {
            throw "ELECTRON_OUTPUT_DIR 未设置"
          }
          $releaseDir = Join-Path (Get-Location) $env:ELECTRON_OUTPUT_DIR
          if (-not (Test-Path $releaseDir)) {
            throw "未找到输出目录：$releaseDir"
          }

          $latest = Join-Path $releaseDir "latest.yml"
          if (-not (Test-Path $latest)) {
            throw "未找到 latest.yml：$latest"
          }

          $setupExe = Get-ChildItem -Path $releaseDir -Filter "*Setup*.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($null -eq $setupExe) {
            throw "未找到 NSIS 安装包（*Setup*.exe）"
          }

          $setupBlockMapPath = "$($setupExe.FullName).blockmap"
          if (-not (Test-Path $setupBlockMapPath)) {
            throw "未找到安装包对应 blockmap：$($setupExe.Name).blockmap"
          }

          Copy-Item $latest -Destination "dist-update/latest.yml" -Force
          Copy-Item $setupExe.FullName -Destination (Join-Path "dist-update" $setupExe.Name) -Force
          Copy-Item $setupBlockMapPath -Destination (Join-Path "dist-update" "$(Split-Path $setupBlockMapPath -Leaf)") -Force

          Write-Host "dist-update files:"
          Get-ChildItem dist-update | Select-Object Name, Length | Format-Table -AutoSize

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-update-files
          path: dist-update/*
          if-no-files-found: error

  publish-update-artifacts:
    name: 上传增量更新文件
    runs-on: ubuntu-latest
    needs: build-windows-installer
    env:
      # 兼容旧配置：允许把 UPDATE_SERVER_PATH 填成站点根目录，流程会自动补成 <root>/updates。
      UPDATE_SERVER_PATH_RAW: ${{ secrets.UPDATE_SERVER_PATH || '/www/wwwroot/tuan-chat-web' }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: electron-update-files
          path: dist-update

      - name: 解析更新发布连接信息
        env:
          SERVER_HOST_SECRET: ${{ secrets.SERVER_HOST }}
          SERVER_PORT_SECRET: ${{ secrets.SERVER_PORT }}
          SERVER_USERNAME_SECRET: ${{ secrets.SERVER_USERNAME }}
          SERVER_PRIVATE_KEY_SECRET: ${{ secrets.SERVER_PRIVATE_KEY }}
          SERVER_PASSWORD_SECRET: ${{ secrets.SERVER_PASSWORD }}
          SSH_HOST_SECRET: ${{ secrets.SSH_HOST }}
          SSH_PORT_SECRET: ${{ secrets.SSH_PORT }}
          SSH_USERNAME_SECRET: ${{ secrets.SSH_USERNAME }}
          SSH_PRIVATE_KEY_SECRET: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PASSWORD_SECRET: ${{ secrets.SSH_PASSWORD }}
          UPDATE_SERVER_HOST_SECRET: ${{ secrets.UPDATE_SERVER_HOST }}
          UPDATE_SERVER_PORT_SECRET: ${{ secrets.UPDATE_SERVER_PORT }}
          UPDATE_SERVER_USERNAME_SECRET: ${{ secrets.UPDATE_SERVER_USERNAME }}
          UPDATE_SERVER_PRIVATE_KEY_SECRET: ${{ secrets.UPDATE_SERVER_PRIVATE_KEY }}
          UPDATE_SERVER_PASSWORD_SECRET: ${{ secrets.UPDATE_SERVER_PASSWORD }}
        run: |
          set -euo pipefail

          trim_secret() {
            local value="$1"
            value="${value//$'\r'/}"
            value="${value//$'\n'/}"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "$value"
          }

          pick_first_non_blank() {
            local raw trimmed
            for raw in "$@"; do
              trimmed="$(trim_secret "$raw")"
              if [[ -n "$trimmed" ]]; then
                printf '%s' "$trimmed"
                return 0
              fi
            done
            return 1
          }

          normalize_private_key() {
            local value="$1"
            value="${value//$'\r'/}"
            printf '%s' "$value"
          }

          pick_first_private_key() {
            local raw normalized compact
            for raw in "$@"; do
              normalized="$(normalize_private_key "$raw")"
              compact="${normalized//[$' \t\n']/}"
              if [[ -n "$compact" ]]; then
                printf '%s' "$normalized"
                return 0
              fi
            done
            return 1
          }

          UPDATE_SERVER_HOST="$(
            pick_first_non_blank \
              "${UPDATE_SERVER_HOST_SECRET:-}" \
              "${SERVER_HOST_SECRET:-}" \
              "${SSH_HOST_SECRET:-}" \
              "38.14.195.6"
          )"

          UPDATE_SERVER_PORT="$(
            pick_first_non_blank \
              "${UPDATE_SERVER_PORT_SECRET:-}" \
              "${SERVER_PORT_SECRET:-}" \
              "${SSH_PORT_SECRET:-}" \
              "22"
          )"

          UPDATE_SERVER_USERNAME="$(
            pick_first_non_blank \
              "${UPDATE_SERVER_USERNAME_SECRET:-}" \
              "${SERVER_USERNAME_SECRET:-}" \
              "${SSH_USERNAME_SECRET:-}" \
              || true
          )"

          UPDATE_SERVER_PRIVATE_KEY="$(
            pick_first_private_key \
              "${UPDATE_SERVER_PRIVATE_KEY_SECRET:-}" \
              "${SERVER_PRIVATE_KEY_SECRET:-}" \
              "${SSH_PRIVATE_KEY_SECRET:-}" \
              || true
          )"

          UPDATE_SERVER_PASSWORD="$(
            pick_first_non_blank \
              "${UPDATE_SERVER_PASSWORD_SECRET:-}" \
              "${SERVER_PASSWORD_SECRET:-}" \
              "${SSH_PASSWORD_SECRET:-}" \
              || true
          )"

          if [[ -n "${UPDATE_SERVER_PRIVATE_KEY}" ]]; then
            UPDATE_SERVER_AUTH_MODE="key"
            UPDATE_SERVER_PASSWORD=""
          else
            UPDATE_SERVER_AUTH_MODE="password"
          fi

          test -n "${UPDATE_SERVER_HOST}" || { echo "缺少更新发布主机：请配置 UPDATE_SERVER_HOST / SERVER_HOST / SSH_HOST"; exit 1; }
          test -n "${UPDATE_SERVER_PORT}" || { echo "缺少更新发布端口：请配置 UPDATE_SERVER_PORT / SERVER_PORT / SSH_PORT"; exit 1; }
          test -n "${UPDATE_SERVER_USERNAME}" || { echo "缺少更新发布用户名：请配置 UPDATE_SERVER_USERNAME / SERVER_USERNAME / SSH_USERNAME"; exit 1; }
          if [[ "${UPDATE_SERVER_AUTH_MODE}" == "key" ]]; then
            test -n "${UPDATE_SERVER_PRIVATE_KEY}" || { echo "缺少更新发布私钥：请配置 UPDATE_SERVER_PRIVATE_KEY / SERVER_PRIVATE_KEY / SSH_PRIVATE_KEY"; exit 1; }
          else
            test -n "${UPDATE_SERVER_PASSWORD}" || { echo "缺少更新发布密码：请配置 UPDATE_SERVER_PASSWORD / SERVER_PASSWORD / SSH_PASSWORD"; exit 1; }
          fi

          if [[ -n "${UPDATE_SERVER_PASSWORD}" ]]; then
            echo "::add-mask::${UPDATE_SERVER_PASSWORD}"
          fi

          PRIVATE_KEY_EOF="__UPDATE_SERVER_PRIVATE_KEY__"
          {
            echo "UPDATE_SERVER_AUTH_MODE=${UPDATE_SERVER_AUTH_MODE}"
            echo "UPDATE_SERVER_HOST=${UPDATE_SERVER_HOST}"
            echo "UPDATE_SERVER_PORT=${UPDATE_SERVER_PORT}"
            echo "UPDATE_SERVER_USERNAME=${UPDATE_SERVER_USERNAME}"
            if [[ -n "${UPDATE_SERVER_PRIVATE_KEY}" ]]; then
              echo "UPDATE_SERVER_PRIVATE_KEY<<${PRIVATE_KEY_EOF}"
              printf '%s\n' "${UPDATE_SERVER_PRIVATE_KEY}"
              echo "${PRIVATE_KEY_EOF}"
            fi
            if [[ -n "${UPDATE_SERVER_PASSWORD}" ]]; then
              echo "UPDATE_SERVER_PASSWORD=${UPDATE_SERVER_PASSWORD}"
            fi
          } >> "$GITHUB_ENV"

          echo "更新发布连接：${UPDATE_SERVER_HOST}:${UPDATE_SERVER_PORT}（认证方式：${UPDATE_SERVER_AUTH_MODE}）"

      - name: Validate publish secrets
        run: |
          set -euo pipefail

          test -n "${UPDATE_SERVER_HOST}" || { echo "缺少 secret: UPDATE_SERVER_HOST"; exit 1; }
          test -n "${UPDATE_SERVER_USERNAME}" || { echo "缺少 secret: UPDATE_SERVER_USERNAME"; exit 1; }
          if [[ "${UPDATE_SERVER_AUTH_MODE}" == "password" ]]; then
            test -n "${UPDATE_SERVER_PASSWORD}" || { echo "缺少 secret: UPDATE_SERVER_PASSWORD"; exit 1; }
          else
            test -n "${UPDATE_SERVER_PRIVATE_KEY}" || { echo "缺少 secret: UPDATE_SERVER_PRIVATE_KEY / SSH_PRIVATE_KEY"; exit 1; }
          fi
          test -n "${UPDATE_SERVER_PATH_RAW}" || { echo "缺少 secret: UPDATE_SERVER_PATH"; exit 1; }

          if [[ "${UPDATE_SERVER_PATH_RAW}" == */updates ]]; then
            UPDATE_SERVER_PATH="${UPDATE_SERVER_PATH_RAW}"
          else
            UPDATE_SERVER_PATH="${UPDATE_SERVER_PATH_RAW%/}/updates"
          fi
          echo "UPDATE_SERVER_PATH=${UPDATE_SERVER_PATH}" >> "$GITHUB_ENV"
          echo "使用更新发布目录：${UPDATE_SERVER_PATH}"

      - name: Upload update files（SSH 私钥）
        if: ${{ env.UPDATE_SERVER_AUTH_MODE == 'key' }}
        uses: appleboy/scp-action@v1
        with:
          host: ${{ env.UPDATE_SERVER_HOST }}
          username: ${{ env.UPDATE_SERVER_USERNAME }}
          key: ${{ env.UPDATE_SERVER_PRIVATE_KEY }}
          port: ${{ env.UPDATE_SERVER_PORT }}
          source: dist-update/*
          target: ${{ env.UPDATE_SERVER_PATH }}
          strip_components: 1
          overwrite: true

      - name: Upload update files（SSH 密码）
        if: ${{ env.UPDATE_SERVER_AUTH_MODE == 'password' }}
        uses: appleboy/scp-action@v1
        with:
          host: ${{ env.UPDATE_SERVER_HOST }}
          username: ${{ env.UPDATE_SERVER_USERNAME }}
          password: ${{ env.UPDATE_SERVER_PASSWORD }}
          port: ${{ env.UPDATE_SERVER_PORT }}
          source: dist-update/*
          target: ${{ env.UPDATE_SERVER_PATH }}
          strip_components: 1
          overwrite: true

      - name: Verify remote files（SSH 私钥）
        if: ${{ env.UPDATE_SERVER_AUTH_MODE == 'key' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.UPDATE_SERVER_HOST }}
          username: ${{ env.UPDATE_SERVER_USERNAME }}
          key: ${{ env.UPDATE_SERVER_PRIVATE_KEY }}
          port: ${{ env.UPDATE_SERVER_PORT }}
          script: |
            set -euo pipefail
            TARGET="${{ env.UPDATE_SERVER_PATH }}"

            test -f "${TARGET}/latest.yml"
            find "${TARGET}" -maxdepth 1 -type f -name "*.exe" | grep -q .
            find "${TARGET}" -maxdepth 1 -type f -name "*.exe.blockmap" | grep -q .

            echo "✅ 增量更新文件已发布到 ${TARGET}"

      - name: Verify remote files（SSH 密码）
        if: ${{ env.UPDATE_SERVER_AUTH_MODE == 'password' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.UPDATE_SERVER_HOST }}
          username: ${{ env.UPDATE_SERVER_USERNAME }}
          password: ${{ env.UPDATE_SERVER_PASSWORD }}
          port: ${{ env.UPDATE_SERVER_PORT }}
          script: |
            set -euo pipefail
            TARGET="${{ env.UPDATE_SERVER_PATH }}"

            test -f "${TARGET}/latest.yml"
            find "${TARGET}" -maxdepth 1 -type f -name "*.exe" | grep -q .
            find "${TARGET}" -maxdepth 1 -type f -name "*.exe.blockmap" | grep -q .

            echo "✅ 增量更新文件已发布到 ${TARGET}"
