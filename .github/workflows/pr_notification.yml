name: PR Notification to Feishu

on:
  pull_request:
    branches: [ main ]
    types: [opened, reopened, synchronize]

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Send Feishu Notification
        env:
          FEISHU_WEBHOOK_ID: ${{ secrets.FEISHU_WEBHOOK_ID }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
        uses: actions/github-script@v6
        with:
          script: |
            const crypto = require('crypto');
            const https = require('https');
            
            const webhookId = process.env.FEISHU_WEBHOOK_ID;
            const secret = process.env.FEISHU_SECRET;
            if (!webhookId || !secret) {
              throw new Error('Missing required Feishu secrets: FEISHU_WEBHOOK_ID / FEISHU_SECRET');
            }
            
            // 计算签名 - 修正为飞书API要求的格式
            const timestamp = Math.floor(Date.now() / 1000);
            const stringToSign = `${timestamp}\n${secret}`;
            const sign = crypto.createHmac('sha256', stringToSign).digest('base64');
            
            console.log('Preparing PR notification payload');
            const pr = context.payload.pull_request;
            const baseRepo = pr.base.repo.full_name;
            const headRepo = pr.head.repo.full_name;
            const isCrossRepo = baseRepo !== headRepo;
            const buildMarkdownBlock = (content) => ({
              tag: "div",
              text: {
                tag: "lark_md",
                content,
              },
            });
            
            const payload = {
              timestamp: String(timestamp), // 转为字符串
              sign: sign,
              msg_type: "interactive",
              card: {
                config: {
                  wide_screen_mode: true
                },
                header: {
                  title: {
                    tag: "plain_text",
                    content: "🔔 收到新的PR请求"
                  },
                  template: "blue"
                },
                elements: [
                  buildMarkdownBlock(`**PR标题**: ${pr.title}`),
                  buildMarkdownBlock(`**创建者**: ${pr.user.login}`),
                  buildMarkdownBlock(`**目标仓库/分支**: ${baseRepo}@${pr.base.ref}`),
                  buildMarkdownBlock(`**源仓库/分支**: ${headRepo}@${pr.head.ref}`),
                  buildMarkdownBlock(`**状态**: ${pr.state}`),
                  {
                    tag: "action",
                    actions: [
                      {
                        tag: "button",
                        text: {
                          tag: "plain_text",
                          content: "查看PR详情"
                        },
                        url: context.payload.pull_request.html_url,
                        type: "primary"
                      }
                    ]
                  }
                ]
              }
            };

            if (isCrossRepo) {
              payload.card.elements.splice(5, 0, buildMarkdownBlock(`**说明**: 这是跨仓库 PR，来源为 fork 仓库 \`${headRepo}\`。`));
            }
            
            try {
              console.log('Sending PR notification to Feishu');
              
              // 修正请求方式，按照示例代码
              const postData = JSON.stringify(payload);
              
              return new Promise((resolve, reject) => {
                const req = https.request({
                  hostname: 'open.feishu.cn',
                  port: 443,
                  path: `/open-apis/bot/v2/hook/${webhookId}`,
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Content-Length': Buffer.byteLength(postData)
                  }
                }, (res) => {
                  let data = '';
                  res.on('data', (chunk) => {
                    data += chunk;
                    process.stdout.write(chunk); // 直接输出响应数据
                  });
                  
                  res.on('end', () => {
                    console.log(`Feishu API response status: ${res.statusCode}`);
                    console.log(`Feishu API response body: ${data}`);
                    
                    if (res.statusCode !== 200) {
                      return reject(new Error(`Feishu API responded with status: ${res.statusCode}`));
                    }
                    let parsed;
                    try {
                      parsed = JSON.parse(data);
                    } catch (parseError) {
                      return reject(new Error(`Feishu API returned non-JSON body: ${data}`));
                    }
                    const responseCode = parsed.code ?? parsed.StatusCode;
                    if (responseCode !== 0) {
                      return reject(new Error(`Feishu API returned code ${responseCode}: ${parsed.msg || parsed.StatusMessage || 'unknown error'}`));
                    }
                    console.log('Feishu notification sent successfully');
                    resolve(data);
                  });
                });
                
                req.on('error', (error) => {
                  console.error('Failed to send Feishu notification:', error.message);
                  reject(error);
                });
                
                req.write(postData);
                req.end();
              });
            } catch (error) {
              console.error('Failed to send Feishu notification:', error.message);
              throw error;
            }
