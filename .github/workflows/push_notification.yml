name: Push Notification to Feishu

on:
  push:
    branches: [ 'main' ]

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Send Feishu Notification
        env:
          FEISHU_WEBHOOK_ID: ${{ secrets.FEISHU_WEBHOOK_ID }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
        uses: actions/github-script@v6
        with:
          script: |
            const crypto = require('crypto');
            const https = require('https');
            
            const webhookId = process.env.FEISHU_WEBHOOK_ID;
            const secret = process.env.FEISHU_SECRET;
            if (!webhookId || !secret) {
              throw new Error('Missing required Feishu secrets: FEISHU_WEBHOOK_ID / FEISHU_SECRET');
            }
            
            // 计算签名 - 修正为飞书API要求的格式
            const timestamp = Math.floor(Date.now() / 1000);
            const stringToSign = `${timestamp}\n${secret}`;
            const sign = crypto.createHmac('sha256', stringToSign).digest('base64');
            
            console.log('Preparing Push notification payload');
            
            const branchName = context.ref.replace('refs/heads/', '');
            const repoResponse = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const repoInfo = repoResponse.data;
            const upstreamFullName = repoInfo.fork && repoInfo.parent ? repoInfo.parent.full_name : null;
            const shortBefore = context.payload.before?.substring(0, 7) || 'unknown';
            const shortAfter = context.payload.after?.substring(0, 7) || 'unknown';
            const compareUrl = context.payload.compare || `${context.payload.repository.html_url}/compare/${context.payload.before}...${context.payload.after}`;
            const actorName = context.actor || context.payload.sender?.login || context.payload.pusher?.name || 'unknown';
            const buildMarkdownBlock = (content) => ({
              tag: "div",
              text: {
                tag: "lark_md",
                content,
              },
            });
            const firstLine = (message) => (message || '').split(/\r?\n/, 1)[0].trim();

            const payload = {
              timestamp: String(timestamp), // 转为字符串
              sign: sign,
              msg_type: "interactive",
              card: {
                config: {
                  wide_screen_mode: true
                },
                header: {
                  title: {
                    tag: "plain_text",
                    content: `🚀 ${branchName}分支有新的Push`
                  },
                  template: "green"
                },
                elements: [
                  buildMarkdownBlock(`**仓库**: ${context.payload.repository.full_name}`),
                  buildMarkdownBlock(`**触发账号**: ${actorName}`),
                  buildMarkdownBlock(`**分支**: ${branchName}`),
                  buildMarkdownBlock(`**比较范围**: ${shortBefore} -> ${shortAfter}`),
                ]
              }
            };

            if (upstreamFullName) {
              payload.card.elements.push(
                buildMarkdownBlock(`**上游仓库**: ${upstreamFullName}`),
                buildMarkdownBlock(`**说明**: 当前通知来自 fork 仓库 \`${context.payload.repository.full_name}\`，不代表上游仓库已发生同名分支更新。`)
              );
            }
            
            // 获取提交信息
            const commits = context.payload.commits;
            if (commits && commits.length > 0) {
              let commitMessages = '';
              const maxCommits = Math.min(5, commits.length);
              
              for (let i = 0; i < maxCommits; i++) {
                const commit = commits[i];
                const title = firstLine(commit.message) || '(no title)';
                const author = commit.author?.name || commit.committer?.name || 'unknown';
                commitMessages += `• ${title} - ${author} (${commit.id.substring(0, 7)})\n`;
              }
              
              if (commits.length > maxCommits) {
                commitMessages += `...以及其他 ${commits.length - maxCommits} 个提交\n`;
              }
              
              payload.card.elements.push(buildMarkdownBlock(`**提交信息**:\n${commitMessages}`));
            }
            
            payload.card.elements.push({
              tag: "action",
              actions: [
                {
                  tag: "button",
                  text: {
                    tag: "plain_text",
                    content: "查看比较"
                  },
                  url: compareUrl,
                  type: "primary"
                },
                {
                  tag: "button",
                  text: {
                    tag: "plain_text",
                    content: "查看末次提交"
                  },
                  url: `${context.payload.repository.html_url}/commit/${context.payload.after}`,
                  type: "default"
                }
              ]
            });
            
            try {
              console.log('Sending Push notification to Feishu');
              
              // 修正请求方式，按照示例代码
              const postData = JSON.stringify(payload);
              
              return new Promise((resolve, reject) => {
                const req = https.request({
                  hostname: 'open.feishu.cn',
                  port: 443,
                  path: `/open-apis/bot/v2/hook/${webhookId}`,
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Content-Length': Buffer.byteLength(postData)
                  }
                }, (res) => {
                  let data = '';
                  res.on('data', (chunk) => {
                    data += chunk;
                    process.stdout.write(chunk); // 直接输出响应数据
                  });
                  
                  res.on('end', () => {
                    console.log(`Feishu API response status: ${res.statusCode}`);
                    console.log(`Feishu API response body: ${data}`);
                    
                    if (res.statusCode !== 200) {
                      return reject(new Error(`Feishu API responded with status: ${res.statusCode}`));
                    }
                    let parsed;
                    try {
                      parsed = JSON.parse(data);
                    } catch (parseError) {
                      return reject(new Error(`Feishu API returned non-JSON body: ${data}`));
                    }
                    const responseCode = parsed.code ?? parsed.StatusCode;
                    if (responseCode !== 0) {
                      return reject(new Error(`Feishu API returned code ${responseCode}: ${parsed.msg || parsed.StatusMessage || 'unknown error'}`));
                    }
                    console.log('Feishu notification sent successfully');
                    resolve(data);
                  });
                });
                
                req.on('error', (error) => {
                  console.error('Failed to send Feishu notification:', error.message);
                  reject(error);
                });
                
                req.write(postData);
                req.end();
              });
            } catch (error) {
              console.error('Failed to send Feishu notification:', error.message);
              throw error;
            }
